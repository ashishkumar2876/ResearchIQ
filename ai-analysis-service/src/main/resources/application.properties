# ===========================
# Server Configuration
# ===========================
server.port=8083

# ===========================
# Application Name
# ===========================
spring.application.name=ai-analysis-service

# ===========================
# MongoDB
# ===========================
spring.data.mongodb.uri=${MONGO_URI}

# ===========================
# Eureka Configuration
# ===========================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ===========================
# RabbitMQ
# ===========================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ===========================
# Logging
# ===========================
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.com.research.ai_analysis_service=DEBUG

# ===========================
# Multipart Configuration
# ===========================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}

# ===========================
# Jackson
# ===========================
spring.jackson.serialization.fail-on-empty-beans=false

# ===========================
# Gemini
# ===========================
gemini.api.key=${GEMINI_API_KEY}

paper.service.url=${PAPER_SERVICE_URL:http://localhost:8082}