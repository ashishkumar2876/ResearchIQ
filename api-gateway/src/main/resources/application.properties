# ===============================
# Application Configuration
# ===============================
spring.application.name=api-gateway

# ===============================
# Server Configuration
# ===============================
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:ResearchIQSecretKeyResearchIQSecretKey123456}

# ===============================
# Eureka Configuration
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ===============================
# Gateway Discovery Configuration
# ===============================
spring.cloud.gateway.server.webmvc.discovery.locator.enabled=true
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=true

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

##########################################
# Multipart Configuration
##########################################

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}